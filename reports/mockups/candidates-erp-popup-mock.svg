      .btnTextDark { fill:#1E211F; font-size:13px; font-weight:600; font-family:'PingFang SC','Microsoft YaHei',sans-serif; }
      .btnTextLight { fill:#F9F4EB; font-size:13px; font-weight:600; font-family:'PingFang SC','Microsoft YaHei',sans-serif; }
      .chipText { fill:#F7F2E9; font-size:12px; font-weight:600; font-family:'PingFang SC','Microsoft YaHei',sans-serif; }
      .chipTextDark { fill:#544A3E; font-size:12px; font-weight:600; font-family:'PingFang SC','Microsoft YaHei',sans-serif; }
      .modalTitle { fill:#182028; font-size:28px; font-weight:700; font-family:'PingFang SC','Microsoft YaHei',sans-serif; }
      .modalCopy { fill:#5E554A; font-size:13px; font-family:'PingFang SC','Microsoft YaHei',sans-serif; }
